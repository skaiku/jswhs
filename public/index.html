<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Expiration Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <div class="nav-left">
                <h1>Domain Expiration Notification</h1>
            </div>
            <div class="nav-right">
                <div class="command-menu">
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24">
                            <path d="M21.71 20.29L18 16.61A9 9 0 1 0 16.61 18l3.68 3.68a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.39zM11 18a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search domains..." title="Search domains">
                        <kbd class="shortcut">⌘K</kbd>
                    </div>
                </div>
                <div class="actions">
                    <button id="themeToggle" class="btn-secondary" title="Toggle dark mode">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path class="sun-icon" d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-12a1 1 0 0 0 1-1V2a1 1 0 0 0-2 0v2a1 1 0 0 0 1 1zm0 14a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-1-1zm6.36-11.95a1 1 0 0 0 .71-.29l1.41-1.42a1 1 0 0 0-1.42-1.41l-1.41 1.42a1 1 0 0 0 .71 1.7zm-12.72 0a1 1 0 0 0 .71-1.7L4.93 3.93a1 1 0 0 0-1.41 1.41l1.41 1.42a1 1 0 0 0 .71.29zM22 11h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zM4 11H2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zm16.95 6.36a1 1 0 0 0-1.41 1.41l1.41 1.42a1 1 0 0 0 1.41-1.42l-1.41-1.41zM3.05 17.36l-1.41 1.41a1 1 0 0 0 1.41 1.42l1.41-1.42a1 1 0 0 0-1.41-1.41z"/>
                            <path class="moon-icon" d="M12 3a9 9 0 1 0 9 9 9.1 9.1 0 0 0-9-9zm0 16a7 7 0 0 1 0-14 7 7 0 0 1 0 14z"/>
                        </svg>
                    </button>
                    <button id="viewToggle" class="btn-secondary" title="Toggle view">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <span>View</span>
                    </button>
                    <a href="/config.html" class="btn-secondary" title="Configuration">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Settings</span>
                    </a>
                </div>
            </div>
        </nav>
        
        <main class="main-content">
            <div id="dashboard" class="dashboard card-view">
                <!-- Domain cards will be inserted here -->
            </div>
        </main>
    </div>
    <script src="toast.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
